<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Supermercado</title>
    <script>
        window.onload = inicio;

        let total = 0;

        function inicio() {
            let botao = document.getElementById('botao');
            botao.addEventListener('click', adicionar);
        }

        function adicionar() {
            let txtItem = document.getElementById('item').value;
            let lista = document.getElementById('lista');

            lista.innerHTML += "<li>" + txtItem + "</li>";

            total = total + 1;
            document.getElementById('quantidade').innerHTML = total;

            document.getElementById('item').value = "";
        }
    </script>
</head>

<body>
    <h2>Lista de Compras</h2>
    Item: <input type="text" id="item">
    <button id="botao">Adicionar</button>

    <h3>Itens adicionados (Total: <span id="quantidade">0</span>):</h3>
    <ul id="lista"></ul>
</body>

</html>
