<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>
    <script>
        window.onload = inicio;
        let listaItens = [];

        function inicio() {
            let botao = document.getElementById('btnAdiciona');
            botao.addEventListener('click', adicionar);

            let botaoRemove = document.getElementById('btnRemove');
            botaoRemove.addEventListener('click', remover);
        }

        function adicionar() {
            let campoItem = document.getElementById('item');
            let texto = campoItem.value;

            listaItens.push([false, texto]);
            atualizar();
            campoItem.value = "";
        }

        function remover() {
            let numero = document.getElementById('numero').value;
            let contador = 0;

            for (let i = 0; i < listaItens.length; i++) {
                if (listaItens[i][0] === false) {
                    contador++;
                    if (contador == numero) {
                        listaItens[i][0] = true;
                        break;
                    }
                }
            }
            atualizar();
            document.getElementById('numero').value = "";
        }

        function atualizar() {
            let listaA = document.getElementById('listaAComprar');
            let listaC = document.getElementById('listaComprados');
            
            listaA.innerHTML = "";
            listaC.innerHTML = "";
            
            for (let i = 0; i < listaItens.length; i++) {
                if (listaItens[i][0] === false) {
                    listaA.innerHTML += "<li>" + listaItens[i][1] + "</li>";
                } else {
                    listaC.innerHTML += "<li>" + listaItens[i][1] + "</li>";
                }
            }
        }
    </script>
</head>

<body>
    <label for="">Item:</label>
    <input type="text" id="item"><br>
    <button id="btnAdiciona">Adicionar</button>
    <h2>Comprar:</h2>
    <ol id="listaAComprar"></ol>
    <label for="">Remover:</label>
    <input type="number" id="numero"><br>
    <button id="btnRemove">Remover</button>
    <h2>Comprado:</h2>
    <ul id="listaComprados"></ul>
</body>

</html>
